<!DOCTYPE html>
<html>
<head>
<title>Workplace Illness Research Form</title>
<style>
body{
font-family:Arial;
background:#f5f7fb;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:800px;
margin:auto;
box-shadow:0 0 10px #ddd;
}

input,select,textarea{
width:100%;
padding:8px;
margin:5px 0;
}

button{
background:#2563eb;
color:white;
padding:10px;
border:none;
width:100%;
font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h2>Workplace Illness Research Form</h2>

<form id="form">

<h3>Basic Info</h3>

Age
<input type="number" name="Age">

Gender
<select name="Gender">
<option>Male</option>
<option>Female</option>
</select>

Height (cm)
<input type="number" name="Height">

Weight (kg)
<input type="number" name="Weight">

BP
<input type="text" name="BP">

Bed Time
<input type="time" name="BedTime">

Wake Up Time
<input type="time" name="WakeUp">

<h3>Working Info</h3>

Working Hour / Day
<input type="number" name="WorkDay">

Working Hour / Week
<input type="number" name="WorkWeek">

Job Nature
<select name="JobNature">
<option>Sitting</option>
<option>Standing</option>
<option>Loading</option>
</select>

Job Area
<select name="JobArea">
<option>Production</option>
<option>Quality</option>
<option>IE</option>
<option>HR</option>
</select>

Primary Symptom
<textarea name="PrimarySymptom"></textarea>

Secondary Symptom
<textarea name="SecondarySymptom"></textarea>

Illness Duration (Days)
<input type="number" name="Duration">

Suggested Test
<textarea name="Test"></textarea>

Recommended Medicine
<textarea name="Medicine"></textarea>

Doctor Name
<input type="text" name="Doctor">

<button type="submit">Submit</button>

</form>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycby-kaBshUytwuj9X7nXLznn_rISngNRbXwpcYKi0Ejkyk5QBoR-Q2MX1QwZRpGqYIVd/exec";

document.getElementById("form").addEventListener("submit", e => {
e.preventDefault();

fetch(scriptURL, {
method: "POST",
body: new FormData(e.target)
})
.then(() => {
alert("Data Submitted Successfully");
document.getElementById("form").reset();
})
});

</script>

</body>
</html>
